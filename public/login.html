<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — Career Advisor</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="nav">
      <a href="index.html" class="brand">🎓 Career Advisor</a>
      <nav><a href="register.html">Sign up</a></nav>
    </header>
    <main class="center">
      <form id="loginForm" class="card auth">
        <h1>Welcome back</h1>
        <p class="muted">Log in to get personalized career advice.</p>
        <label>Email<input type="email" name="email" required /></label>
        <label>Password<input type="password" name="password" required /></label>
        <button type="submit">Log in</button>
        <p id="loginError" class="error" hidden></p>
        <p class="muted">No account? <a href="register.html">Register</a></p>
      </form>
    </main>
    <script src="js/auth.js"></script>
    <script>
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(Object.fromEntries(fd)),
        });
        const data = await res.json();
        if (!res.ok) {
          const err = document.getElementById("loginError");
          err.textContent = data.error || "Login failed";
          err.hidden = false;
          return;
        }
        location.href = "/";
      });
    </script>
  </body>
</html>
