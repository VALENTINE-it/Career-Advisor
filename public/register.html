<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — Career Advisor</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="nav">
      <a href="index.html" class="brand">🎓 Career Advisor</a>
      <nav><a href="login.html">Login</a></nav>
    </header>
    <main class="center">
      <form id="regForm" class="card auth">
        <h1>Create your account</h1>
        <p class="muted">Sign up to save your advice history and chat with an advisor.</p>
        <label>Full name<input name="name" required /></label>
        <label>Email<input type="email" name="email" required /></label>
        <label>Password (min 6)<input type="password" name="password" minlength="6" required /></label>
        <button type="submit">Sign up</button>
        <p id="regError" class="error" hidden></p>
        <p class="muted">Already have an account? <a href="login.html">Log in</a></p>
      </form>
    </main>
    <script>
      document.getElementById("regForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(Object.fromEntries(fd)),
        });
        const data = await res.json();
        if (!res.ok) {
          const err = document.getElementById("regError");
          err.textContent = data.error || "Registration failed";
          err.hidden = false;
          return;
        }
        location.href = "/";
      });
    </script>
  </body>
</html>
