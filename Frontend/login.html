<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In · Career Advisory</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="auth-page">
    <div class="card">
      <h1>Log in</h1>
      <p class="subtitle">Welcome back to Career Advisory.</p>

      <p class="error-box" id="formError" hidden></p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required>
        </div>

        <button type="submit" id="submitBtn">Log in</button>
      </form>

      <p class="form-footer">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const submitBtn = document.getElementById("submitBtn");
    const formError = document.getElementById("formError");

    if (Auth.isLoggedIn()) {
      window.location.href = Auth.role() === "teacher" ? "teacher.html" : "student.html";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      formError.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = "Logging in…";

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Login failed");
        }

        Auth.save(data);
        window.location.href = data.role === "teacher" ? "teacher.html" : "student.html";
      } catch (err) {
        formError.textContent = err.message;
        formError.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
