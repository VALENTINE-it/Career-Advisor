<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register · Career Advisory</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="auth-page">
    <div class="card">
      <h1>Create an account</h1>
      <p class="subtitle">Register as a student or a teacher.</p>

      <p class="error-box" id="formError" hidden></p>

      <form id="registerForm">
        <div class="role-choice">
          <label>
            <input type="radio" name="role" value="student" checked>
            Student
          </label>
          <label>
            <input type="radio" name="role" value="teacher">
            Teacher
          </label>
        </div>

        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" required>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" minlength="6" required>
        </div>

        <button type="submit" id="submitBtn">Create account</button>
      </form>

      <p class="form-footer">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById("registerForm");
    const submitBtn = document.getElementById("submitBtn");
    const formError = document.getElementById("formError");

    if (Auth.isLoggedIn()) {
      window.location.href = Auth.role() === "teacher" ? "teacher.html" : "student.html";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      formError.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account…";

      const role = document.querySelector('input[name="role"]:checked').value;

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Registration failed");
        }

        Auth.save(data);
        window.location.href = data.role === "teacher" ? "teacher.html" : "student.html";
      } catch (err) {
        formError.textContent = err.message;
        formError.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "Create account";
      }
    });
  </script>
</body>
</html>
